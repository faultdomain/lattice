services:
  vault:
    image: hashicorp/vault:1.15
    container_name: lattice-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lattice

  vault-init:
    image: hashicorp/vault:1.15
    container_name: lattice-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://lattice-vault:8200"
      VAULT_TOKEN: "root"
      GHCR_USER: "${GHCR_USER:-}"
      GHCR_TOKEN: "${GHCR_TOKEN:-}"
    volumes:
      - ./deploy/vault:/scripts:ro
    entrypoint: ["sh", "/scripts/init.sh"]
    networks:
      - lattice
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: lattice-keycloak
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_URL: "${LATTICE_KEYCLOAK_HOSTNAME_URL:-http://lattice-keycloak:8080}"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import
    networks:
      - lattice

  registry-mirror:
    image: registry:2
    container_name: lattice-registry-mirror
    ports:
      - "5555:5000"
    environment:
      REGISTRY_PROXY_REMOTEURL: "https://registry-1.docker.io"
      REGISTRY_PROXY_USERNAME: "${DOCKERHUB_USER:-}"
      REGISTRY_PROXY_PASSWORD: "${DOCKERHUB_TOKEN:-}"
    volumes:
      - registry-mirror-data:/var/lib/registry
    networks:
      - lattice

  ghcr-mirror:
    image: registry:2
    container_name: lattice-ghcr-mirror
    ports:
      - "5556:5000"
    environment:
      REGISTRY_PROXY_REMOTEURL: "https://ghcr.io"
      REGISTRY_PROXY_USERNAME: "${GHCR_USER:-}"
      REGISTRY_PROXY_PASSWORD: "${GHCR_TOKEN:-}"
    volumes:
      - ghcr-mirror-data:/var/lib/registry
    networks:
      - lattice

  pihole:
    image: pihole/pihole:2024.07.0
    container_name: lattice-pihole
    ports:
      - "8053:80"
      - "5353:53/tcp"
      - "5353:53/udp"
    environment:
      WEBPASSWORD: "lattice"
      DNSMASQ_LISTENING: "all"
      PIHOLE_DNS_: "8.8.8.8;8.8.4.4"
    volumes:
      - pihole-data:/etc/pihole
    healthcheck:
      test: ["CMD", "dig", "+short", "@127.0.0.1", "pi.hole"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lattice

volumes:
  pihole-data:
  registry-mirror-data:
  ghcr-mirror-data:

networks:
  lattice:
    # Use the kind network if it exists (Docker provider), otherwise create one
    name: ${LATTICE_NETWORK:-lattice}
    external: ${LATTICE_NETWORK_EXTERNAL:-false}
