---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lattice-istiod-proxy
  labels:
    app.kubernetes.io/managed-by: lattice
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lattice-istiod-proxy
  labels:
    app.kubernetes.io/managed-by: lattice
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lattice-istiod-proxy
subjects:
- kind: ServiceAccount
  name: lattice-istiod-proxy
  namespace: istio-system
