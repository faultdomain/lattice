# Docker workload cluster for E2E testing
# Uses CAPD (Cluster API Provider Docker) for local development/CI
# Has parentConfig so it can provision child clusters (deep hierarchy test)
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: e2e-workload
  labels:
    lattice.dev/environment: e2e-test
    lattice.dev/region: local
spec:
  monitoring:
    enabled: true
    ha: false
  backups:
    enabled: false
  providerRef: docker
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: kubeadm
      certSANs:
        - "127.0.0.1"
        - "localhost"
    config:
      docker:
        lbCidr: "172.18.255.16/28"
  gpu: false
  networkTopology:
    discovery:
      label:
        tiers:
          - nodeLabel: "topology.kubernetes.io/zone"
          - nodeLabel: "topology.lattice.dev/rack"
  nodes:
    controlPlane:
      replicas: 1
    workerPools:
      zone-a-rack-1:
        replicas: 1
        labels:
          topology.kubernetes.io/zone: "zone-a"
          topology.lattice.dev/rack: "rack-1"
      zone-a-rack-2:
        replicas: 1
        labels:
          topology.kubernetes.io/zone: "zone-a"
          topology.lattice.dev/rack: "rack-2"
      zone-b-rack-3:
        replicas: 1
        labels:
          topology.kubernetes.io/zone: "zone-b"
          topology.lattice.dev/rack: "rack-3"
      zone-b-rack-4:
        replicas: 1
        labels:
          topology.kubernetes.io/zone: "zone-b"
          topology.lattice.dev/rack: "rack-4"
      zone-c-rack-5:
        replicas: 1
        labels:
          topology.kubernetes.io/zone: "zone-c"
          topology.lattice.dev/rack: "rack-5"
  registryMirrors:
    - upstream: docker.io
      mirror: "http://172.18.0.1:5555"
    - upstream: ghcr.io
      mirror: "http://172.18.0.1:5556"
  parentConfig:
    grpcPort: 50051
    bootstrapPort: 8443
    service:
      type: LoadBalancer
