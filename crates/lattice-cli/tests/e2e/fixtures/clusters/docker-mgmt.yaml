# Docker management cluster for E2E testing
# Uses CAPD (Cluster API Provider Docker) for local development/CI
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: e2e-mgmt
spec:
  latticeImage: "ghcr.io/evan-hines-js/lattice:latest"
  monitoring:
    enabled: false
  backups:
    enabled: false
  providerRef: docker
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: rke2
      certSANs:
        - "127.0.0.1"
        - "localhost"
    config:
      docker:
        lbCidr: "172.18.255.0/28"
  nodes:
    controlPlane:
      replicas: 1
    workerPools:
      default:
        replicas: 1
  registryMirrors:
    - upstream: docker.io
      mirror: "http://172.18.0.1:5555"
    - upstream: ghcr.io
      mirror: "http://172.18.0.1:5556"
  parentConfig:
    grpcPort: 50051
    bootstrapPort: 8443
    service:
      type: LoadBalancer
