# Docker second-tier workload cluster for E2E testing
# Used to test deep hierarchy and unpivot flow
# This is a leaf cluster (no endpoints) - child of e2e-workload
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: e2e-workload2
  labels:
    lattice.dev/environment: e2e-test
    lattice.dev/region: local
spec:
  latticeImage: "ghcr.io/evan-hines-js/lattice:latest"
  monitoring:
    enabled: true
    ha: false
  backups:
    enabled: false
  providerRef: docker
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: rke2
      certSANs:
        - "127.0.0.1"
        - "localhost"
    config:
      docker: {}
  nodes:
    controlPlane:
      replicas: 1
    workerPools:
      default:
        replicas: 1
  registryMirrors:
    - upstream: docker.io
      mirror: "http://172.18.0.1:5555"
    - upstream: ghcr.io
      mirror: "http://172.18.0.1:5556"
