# Proxmox management cluster for E2E testing
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: e2e-mgmt
spec:
  latticeImage: "ghcr.io/evan-hines-js/lattice:latest"
  monitoring:
    enabled: false
  backups:
    enabled: false
  providerRef: proxmox
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: kubeadm
    config:
      proxmox:
        sshAuthorizedKeys:
          - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID1f8eVKp5YCAtis77YO/oHhWvzAiimDzlDqhtD+85YR evan.hines.dev@gmail.com"
        sourceNode: "poweredge-lg"
        templateId: 9000
        # kube-vip VIP for K8s API server
        controlPlaneEndpoint: "10.0.0.100"
        bridge: "vmbr0"
        # Node IPs assigned by CAPMOX (extra headroom for failed test cleanup)
        ipv4Pool:
          range: "10.0.0.101-105/24"
          gateway: "10.0.0.1"
        dnsServers:
          - "10.0.0.1"
        virtualIpNetworkInterface: "ens18"
        lbCidr: "10.0.0.200/28"
        # Additional NICs for direct L2 reachability to workload cluster networks.
        # Istio east-west gateway needs direct connectivity (no NAT) for mTLS.
        # Each network needs its own IP pool (CAPMOX requirement).
        additionalNetworks:
          - bridge: "vmbr1"
            ipv4Pool:
              range: "10.0.1.201-210/24"
              gateway: "10.0.1.1"
          - bridge: "vmbr2"
            ipv4Pool:
              range: "10.0.2.201-210/24"
              gateway: "10.0.2.1"
  registryMirrors:
    - upstream: docker.io
      mirror: "http://10.0.0.131:5555"
    - upstream: ghcr.io
      mirror: "http://10.0.0.131:5556"
  nodes:
    controlPlane:
      replicas: 1
      instanceType:
        cores: 16
        memoryGib: 32
        diskGib: 50
    workerPools:
      default:
        replicas: 1
        instanceType:
          cores: 16
          memoryGib: 32
          diskGib: 100
  parentConfig:
    grpcPort: 50051
    bootstrapPort: 8443
    service:
      type: LoadBalancer
