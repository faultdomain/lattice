apiVersion: lattice.dev/v1alpha1
kind: LatticeJob
metadata:
  name: pytorch-ddp
  namespace: training-pytorch-test
spec:
  queue: default
  training:
    framework: PyTorch
    coordinatorTask: master
  tasks:
    master:
      replicas: 1
      workload:
        containers:
          main:
            image: ghcr.io/evan-hines-js/pytorch-test:latest
            command:
              - /usr/local/bin/python
              - -c
              - |
                import os, sys

                print("=== Lattice Env Dump ===")
                for var in ["MASTER_ADDR", "MASTER_PORT", "WORLD_SIZE", "RANK", "NODE_RANK"]:
                    print(f"  {var}={os.environ.get(var, 'MISSING')}")

                import torch
                import torch.distributed as dist
                from torch.nn.parallel import DistributedDataParallel as DDP

                print("STEP: init_process_group")
                dist.init_process_group(backend="gloo")
                rank = dist.get_rank()
                world = dist.get_world_size()
                print(f"STEP: initialized rank={rank} world={world}")

                print("STEP: create_model")
                encoder_layer = torch.nn.TransformerEncoderLayer(d_model=64, nhead=4, batch_first=True)
                model = torch.nn.TransformerEncoder(encoder_layer, num_layers=2)
                ddp_model = DDP(model)

                print("STEP: forward_backward")
                x = torch.randn(2, 8, 64)
                out = ddp_model(x)
                loss = out.sum()
                loss.backward()
                print(f"  loss={loss.item():.4f}")

                print("STEP: all_reduce")
                tensor = torch.tensor([float(rank)])
                dist.all_reduce(tensor, op=dist.ReduceOp.SUM)
                expected = float(world * (world - 1) // 2)
                assert tensor.item() == expected, f"all_reduce mismatch: {tensor.item()} != {expected}"
                print(f"  all_reduce result={tensor.item()}")

                dist.destroy_process_group()
                print("PYTORCH_DISTRIBUTED_SUCCESS")
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1Gi
            security:
              runAsUser: 65534
              apparmorProfile: Unconfined
        resources:
          ghcr-creds:
            type: secret
            id: local-regcreds
            params:
              provider: lattice-local
              refreshInterval: 1h
      imagePullSecrets:
        - ghcr-creds
      restartPolicy: Never
    worker:
      replicas: 1
      workload:
        containers:
          main:
            image: ghcr.io/evan-hines-js/pytorch-test:latest
            command:
              - /usr/local/bin/python
              - -c
              - |
                import os, sys

                print("=== Lattice Env Dump ===")
                for var in ["MASTER_ADDR", "MASTER_PORT", "WORLD_SIZE", "RANK", "NODE_RANK"]:
                    print(f"  {var}={os.environ.get(var, 'MISSING')}")

                import torch
                import torch.distributed as dist
                from torch.nn.parallel import DistributedDataParallel as DDP

                print("STEP: init_process_group")
                dist.init_process_group(backend="gloo")
                rank = dist.get_rank()
                world = dist.get_world_size()
                print(f"STEP: initialized rank={rank} world={world}")

                print("STEP: create_model")
                encoder_layer = torch.nn.TransformerEncoderLayer(d_model=64, nhead=4, batch_first=True)
                model = torch.nn.TransformerEncoder(encoder_layer, num_layers=2)
                ddp_model = DDP(model)

                print("STEP: forward_backward")
                x = torch.randn(2, 8, 64)
                out = ddp_model(x)
                loss = out.sum()
                loss.backward()
                print(f"  loss={loss.item():.4f}")

                print("STEP: all_reduce")
                tensor = torch.tensor([float(rank)])
                dist.all_reduce(tensor, op=dist.ReduceOp.SUM)
                expected = float(world * (world - 1) // 2)
                assert tensor.item() == expected, f"all_reduce mismatch: {tensor.item()} != {expected}"
                print(f"  all_reduce result={tensor.item()}")

                dist.destroy_process_group()
                print("PYTORCH_DISTRIBUTED_SUCCESS")
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1Gi
            security:
              runAsUser: 65534
              apparmorProfile: Unconfined
        resources:
          ghcr-creds:
            type: secret
            id: local-regcreds
            params:
              provider: lattice-local
              refreshInterval: 1h
      imagePullSecrets:
        - ghcr-creds
      restartPolicy: Never
