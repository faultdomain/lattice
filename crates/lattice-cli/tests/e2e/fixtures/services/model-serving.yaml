apiVersion: lattice.dev/v1alpha1
kind: LatticeModel
metadata:
  name: llm-serving
  namespace: serving
spec:
  schedulerName: volcano
  recoveryPolicy: ServingGroupRecreate
  restartGracePeriodSeconds: 30
  modelSource:
    uri: "hf://hf-internal-testing/tiny-random-LlamaForCausalLM"
    cacheSize: "1Gi"
  defaults:
    entryWorkload:
      containers:
        main:
          image: ghcr.io/yaozengzeng/vllm-mock:latest
          command: ["python3", "app.py"]
          variables:
            MODEL_NAME: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          security:
            runAsUser: 65534
            apparmorProfile: Unconfined
      resources:
        ghcr-creds:
          type: secret
          id: local-regcreds
          params:
            provider: lattice-local
            refreshInterval: 1h
    entryRuntime:
      imagePullSecrets:
        - ghcr-creds
  roles:
    prefill:
      replicas: 1
    decode:
      replicas: 1
      entryWorkload:
        containers:
          metrics:
            image: ghcr.io/evan-hines-js/busybox:latest
            command: ["/bin/sh", "-c", "mkdir -p /tmp/www && printf '# HELP gpu_kv_cache_usage KV cache usage ratio\\n# TYPE gpu_kv_cache_usage gauge\\ngpu_kv_cache_usage 0.95\\n' > /tmp/www/metrics && httpd -f -p 9090 -h /tmp/www"]
            volumes:
              /tmp: {}
            resources:
              requests:
                cpu: 50m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 64Mi
            security:
              runAsUser: 65534
              apparmorProfile: Unconfined
        service:
          ports:
            metrics:
              port: 9090
      autoscaling:
        max: 8
        metrics:
          - metric: gpu_kv_cache_usage
            target: 0.8
        tolerancePercent: 10
        behavior:
          scaleUp:
            panicThresholdPercent: 200
            panicModeHold: "5m"
            stabilizationWindow: "1m"
            period: "30s"
          scaleDown:
            stabilizationWindow: "5m"
            period: "1m"
      workerReplicas: 1
      workerWorkload:
        containers:
          main:
            image: ghcr.io/yaozengzeng/vllm-mock:latest
            command: ["python3", "app.py"]
            variables:
              MODEL_NAME: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
            resources:
              requests:
                cpu: 100m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
            security:
              runAsUser: 65534
              apparmorProfile: Unconfined
  routing:
    inferenceEngine: vLLM
    model: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
    port: 8000
    kvConnector:
      type: nixl
      port: 5557
    trafficPolicy:
      retry:
        attempts: 3
    routes:
      default:
        rules:
          - name: default
            targetModels:
              - weight: 100
