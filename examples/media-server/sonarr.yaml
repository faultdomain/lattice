apiVersion: lattice.dev/v1alpha1
kind: LatticeService
metadata:
  name: sonarr
  namespace: media
spec:
  environment: media
  containers:
    main:
      image: linuxserver/sonarr:latest
      variables:
        PUID: "1000"
        PGID: "1000"
        TZ: "America/New_York"
      volumes:
        /config:
          source: ${resources.config}
        /downloads:
          source: ${resources.downloads}
        /media:
          source: ${resources.media}
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      readinessProbe:
        httpGet:
          path: /ping
          port: 8989
        initialDelaySeconds: 30
        periodSeconds: 10
  service:
    ports:
      http:
        port: 8989
        protocol: TCP
  resources:
    # Owned volume (private to this service)
    config:
      type: volume
      params:
        size: 5Gi
        storageClass: local-path
    # Shared volume REFERENCES (no size = reference only)
    downloads:
      type: volume
      id: media-downloads
    media:
      type: volume
      id: media-library
    # Service dependencies (bilateral agreements)
    nzbget:
      type: service
      direction: outbound
      outbound:
        retries:
          attempts: 3
          perTryTimeout: 10s
          retryOn:
            - 5xx
            - connect-failure
        timeout:
          request: 30s
    jellyfin:
      type: service
      direction: outbound
      outbound:
        timeout:
          request: 60s
  ingress:
    hosts:
      - sonarr.home.local
    tls:
      mode: auto
      issuerRef:
        name: letsencrypt-prod
  replicas:
    min: 1
