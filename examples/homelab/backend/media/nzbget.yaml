# Cedar policy: allow nzbget security overrides for VPN sidecar
apiVersion: lattice.dev/v1alpha1
kind: CedarPolicy
metadata:
  name: nzbget-security
  namespace: lattice-system
spec:
  description: Allow nzbget security overrides for VPN sidecar and linuxserver.io entrypoint
  policies: |
    // wireguard sidecar: tunnel setup
    permit(
      principal == Lattice::Service::"media/nzbget",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:NET_ADMIN"
    );
    permit(
      principal == Lattice::Service::"media/nzbget",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:SYS_MODULE"
    );
    permit(
      principal == Lattice::Service::"media/nzbget",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"apparmor:Unconfined"
    );
    permit(
      principal == Lattice::Service::"media/nzbget",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"allowedBinary:*"
    );

    // both containers run as root (linuxserver.io images require it)
    permit(
      principal == Lattice::Service::"media/nzbget",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"runAsRoot"
    );
    permit(
      principal == Lattice::Service::"media/nzbget",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"readWriteRootFilesystem"
    );

    // nzbget main container capabilities for linuxserver.io init
    permit(
      principal == Lattice::Service::"media/nzbget",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:CHOWN"
    );
    permit(
      principal == Lattice::Service::"media/nzbget",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:DAC_OVERRIDE"
    );
    permit(
      principal == Lattice::Service::"media/nzbget",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:FOWNER"
    );
    permit(
      principal == Lattice::Service::"media/nzbget",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:KILL"
    );
    permit(
      principal == Lattice::Service::"media/nzbget",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:SETUID"
    );
    permit(
      principal == Lattice::Service::"media/nzbget",
      action == Lattice::Action::"OverrideSecurity",
      resource == Lattice::SecurityOverride::"capability:SETGID"
    );

    // secret access for VPN credentials
    permit(
      principal == Lattice::Service::"media/nzbget",
      action == Lattice::Action::"AccessSecret",
      resource == Lattice::SecretPath::"lattice-local:vpn-credentials"
    );

    // external endpoint access for VPN gateway
    permit(
      principal == Lattice::Service::"media/nzbget",
      action == Lattice::Action::"AccessExternalEndpoint",
      resource == Lattice::ExternalEndpoint::"79.127.187.156:51820"
    );
---
apiVersion: lattice.dev/v1alpha1
kind: LatticeService
metadata:
  name: nzbget
  namespace: media
spec:
  workload:
    containers:
      main:
        image: docker.io/linuxserver/nzbget:latest
        security:
          runAsUser: 0
          readOnlyRootFilesystem: false
          apparmorProfile: Unconfined
          capabilities: [CHOWN, DAC_OVERRIDE, FOWNER, KILL, SETUID, SETGID]
          allowedBinaries: ["*"]
        variables:
          PUID: "1000"
          PGID: "1000"
          TZ: "America/New_York"
        volumes:
          /config:
            source: ${resources.config}
          /downloads:
            source: ${resources.media-storage}
            path: downloads
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        readinessProbe:
          exec:
            command: ["nc", "-z", "127.0.0.1", "6789"]
    service:
      ports:
        http:
          port: 6789
          protocol: TCP
    resources:
      config:
        type: volume
        params:
          size: 1Gi
      media-storage:
        type: volume
        id: media-storage
      vpn-credentials:
        type: secret
        id: vpn-credentials
        params:
          provider: lattice-local
          refreshInterval: 1h
          keys: [private_key, public_key, endpoint, address]
      vpn-gateway:
        type: external-service
        direction: outbound
        params:
          endpoints:
            wireguard: udp://79.127.187.156:51820
      sonarr:
        type: service
        direction: inbound
  sidecars:
    wireguard:
      image: docker.io/linuxserver/wireguard:latest
      command: ["/init"]
      variables:
        PUID: "1000"
        PGID: "1000"
      files:
        /config/wg_confs/wg0.conf:
          content: |
            [Interface]
            PrivateKey = ${secret.vpn-credentials.private_key}
            Address = ${secret.vpn-credentials.address}

            PostUp = GATEWAY=$(ip route | awk '/default/{print $3}'); EP_IP=$(echo ${secret.vpn-credentials.endpoint} | cut -d: -f1); ip route add $EP_IP via $GATEWAY
            PostUp = GATEWAY=$(ip route | awk '/default/{print $3}'); ip route add 10.0.0.0/8 via $GATEWAY || true
            PostUp = GATEWAY=$(ip route | awk '/default/{print $3}'); ip route add 192.168.0.0/16 via $GATEWAY || true
            PostUp = iptables -t nat -I ISTIO_OUTPUT 1 -p udp --dport 53 -j RETURN
            PostUp = iptables -t nat -A POSTROUTING -o wg0 -j MASQUERADE
            PostUp = iptables -I OUTPUT -o eth0 -p udp --dport 51820 -j ACCEPT
            PostUp = iptables -I OUTPUT -o eth0 -d 10.0.0.0/8 -j ACCEPT
            PostUp = iptables -I OUTPUT -o eth0 -d 192.168.0.0/16 -j ACCEPT
            PostUp = iptables -A OUTPUT -o eth0 -j REJECT
            PostDown = EP_IP=$(echo ${secret.vpn-credentials.endpoint} | cut -d: -f1); GATEWAY=$(ip route | awk '/default/{print $3}'); ip route del $EP_IP via $GATEWAY || true
            PostDown = GATEWAY=$(ip route | awk '/default/{print $3}'); ip route del 10.0.0.0/8 via $GATEWAY || true
            PostDown = GATEWAY=$(ip route | awk '/default/{print $3}'); ip route del 192.168.0.0/16 via $GATEWAY || true
            PostDown = iptables -t nat -D ISTIO_OUTPUT -p udp --dport 53 -j RETURN || true
            PostDown = iptables -t nat -D POSTROUTING -o wg0 -j MASQUERADE
            PostDown = iptables -D OUTPUT -o eth0 -p udp --dport 51820 -j ACCEPT
            PostDown = iptables -D OUTPUT -o eth0 -d 10.0.0.0/8 -j ACCEPT
            PostDown = iptables -D OUTPUT -o eth0 -d 192.168.0.0/16 -j ACCEPT
            PostDown = iptables -D OUTPUT -o eth0 -j REJECT

            [Peer]
            PublicKey = ${secret.vpn-credentials.public_key}
            Endpoint = ${secret.vpn-credentials.endpoint}
            AllowedIPs = 0.0.0.0/1, 128.0.0.0/1
            PersistentKeepalive = 25
      security:
        runAsUser: 0
        readOnlyRootFilesystem: false
        capabilities: [NET_ADMIN, SYS_MODULE, CHOWN, FOWNER, DAC_OVERRIDE]
        apparmorProfile: Unconfined
        allowedBinaries: ["*"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
  replicas: 1
  ingress:
    gatewayClass: istio
    routes:
      public:
        hosts:
          - nzbget.home.arpa
        advertise:
          allowedServices: ["*"]
        tls:
          issuerRef:
            name: homelab-selfsigned
