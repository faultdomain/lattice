# Workload cluster on isolated Proxmox bridge
# Sits on vmbr1 — only reachable from the management cluster via
# Lattice's outbound-only gRPC tunnel. No direct network access.
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: workload
  labels:
    lattice.dev/environment: example
    lattice.dev/region: proxmox
spec:
  latticeImage: "ghcr.io/evan-hines-js/lattice:latest"
  monitoring:
    enabled: true
    ha: false
  backups:
    enabled: false
  providerRef: proxmox
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: rke2
    config:
      proxmox:
        sshAuthorizedKeys:
          - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID1f8eVKp5YCAtis77YO/oHhWvzAiimDzlDqhtD+85YR evan.hines.dev@gmail.com"
        sourceNode: "poweredge-lg"
        templateId: 9000
        controlPlaneEndpoint: "10.0.1.110"
        bridge: "vmbr1"
        ipv4Pool:
          range: "10.0.1.111-120/24"
          gateway: "10.0.1.1"
        dnsServers:
          - "10.0.0.1"
        virtualIpNetworkInterface: "ens18"
        lbCidr: "10.0.1.216/28"
  nodes:
    controlPlane:
      replicas: 1
      instanceType:
        cores: 16
        memoryGib: 32
        diskGib: 50
    workerPools:
      default:
        replicas: 2
        instanceType:
          cores: 16
          memoryGib: 32
          diskGib: 100
