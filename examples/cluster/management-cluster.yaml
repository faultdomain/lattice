# Single Lattice cluster for local development
# Has parentConfig so it can optionally provision child clusters later
apiVersion: lattice.dev/v1alpha1
kind: LatticeCluster
metadata:
  name: management
  labels:
    lattice.dev/environment: example
    lattice.dev/region: local
spec:
  providerRef: docker
  provider:
    kubernetes:
      version: "1.32.0"
      bootstrap: kubeadm
      certSANs:
        - "127.0.0.1"
        - "localhost"
    config:
      docker:
        lbCidr: "172.18.255.0/28"
  nodes:
    controlPlane:
      replicas: 1
    workerPools:
      default:
        replicas: 1
  services: true
  monitoring:
    enabled: true
    ha: false
  backups:
    enabled: false
  registryMirrors:
    - upstream: docker.io
      mirror: "http://172.18.0.1:5555"
    - upstream: ghcr.io
      mirror: "http://172.18.0.1:5556"
  parentConfig:
    grpcPort: 50051
    bootstrapPort: 8443
    service:
      type: LoadBalancer
