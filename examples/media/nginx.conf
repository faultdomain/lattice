server {
    listen 80;
    server_name jellyfin.home.arpa sonarr.home.arpa nzbget.home.arpa;

    location / {
        # Replace with your media-ingress LoadBalancer IP:
        #   kubectl get svc -n media media-ingress -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
        proxy_pass https://172.18.255.10;
        proxy_ssl_verify off;  # self-signed certs
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required by Jellyfin)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Streaming — disable buffering for media playback
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
